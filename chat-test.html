<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHIFU-AI チャットテスト</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
    }

    .chat-container {
      width: 100%;
      max-width: 680px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      display: flex;
      flex-direction: column;
      height: 85vh;
      overflow: hidden;
    }

    .chat-header {
      background: linear-gradient(135deg, #c0392b 0%, #922b21 100%);
      color: #fff;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .chat-header .avatar {
      width: 40px;
      height: 40px;
      background: rgba(255,255,255,0.25);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .chat-header .info h2 { font-size: 15px; font-weight: 600; }
    .chat-header .info p { font-size: 12px; opacity: 0.85; margin-top: 2px; }

    .chat-header .badge {
      margin-left: auto;
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 11px;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .message { display: flex; gap: 10px; align-items: flex-end; }
    .message.user { flex-direction: row-reverse; }

    .message .bubble {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .message.ai .bubble { background: #f4f4f4; color: #222; border-bottom-left-radius: 4px; }
    .message.user .bubble { background: #c0392b; color: #fff; border-bottom-right-radius: 4px; }

    .message .icon {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
    }

    .message.ai .icon { background: #f4dada; }
    .message.user .icon { background: #c0392b; color: #fff; }

    .typing-indicator .bubble { display: flex; gap: 4px; padding: 12px 16px; align-items: center; }

    .dot {
      width: 7px; height: 7px; background: #aaa; border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    .input-area {
      padding: 12px 16px;
      border-top: 1px solid #eee;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
      background: #fff;
    }

    .input-area textarea {
      flex: 1;
      border: 1.5px solid #ddd;
      border-radius: 20px;
      padding: 10px 16px;
      font-size: 14px;
      resize: none;
      outline: none;
      font-family: inherit;
      line-height: 1.5;
      max-height: 120px;
      transition: border-color 0.2s;
    }

    .input-area textarea:focus { border-color: #c0392b; }

    .input-area button {
      width: 42px; height: 42px;
      background: #c0392b; color: #fff;
      border: none; border-radius: 50%;
      cursor: pointer; font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.1s;
    }

    .input-area button:hover { background: #a93226; }
    .input-area button:active { transform: scale(0.95); }
    .input-area button:disabled { background: #ccc; cursor: not-allowed; }

    .quick-prompts {
      padding: 0 16px 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .quick-prompts button {
      background: #fff0f0; color: #c0392b;
      border: 1px solid #f5c0c0; border-radius: 20px;
      padding: 5px 12px; font-size: 12px;
      cursor: pointer; font-family: inherit;
      transition: background 0.2s;
    }

    .quick-prompts button:hover { background: #ffe0e0; }

    @media (max-width: 480px) {
      body { padding: 0; align-items: flex-start; }
      .chat-container { height: 100vh; border-radius: 0; }
      .message .bubble { max-width: 85%; }
    }
  </style>
</head>
<body>
<div class="chat-container">
  <div class="chat-header">
    <div class="avatar">🤖</div>
    <div class="info">
      <h2>SHIFU-AI</h2>
      <p>AIシフトアドバイザー｜上海湯包小館</p>
    </div>
    <span class="badge">● オンライン</span>
  </div>

  <div class="messages" id="messages">
    <div class="message ai">
      <div class="icon">🤖</div>
      <div class="bubble">こんにちは！SHIFU-AIです。シフト管理に関するご相談をお気軽にどうぞ。配置バランス、繁忙期の人員計画、急な欠員対応など、何でもサポートします！</div>
    </div>
  </div>

  <div class="quick-prompts">
    <button onclick="sendQuick('今週末の繁忙期、人員配置のポイントを教えて')">繁忙期の配置</button>
    <button onclick="sendQuick('急な欠員が出た場合の対処法は？')">急な欠員対応</button>
    <button onclick="sendQuick('シフトコストを削減するコツは？')">コスト最適化</button>
    <button onclick="sendQuick('新人スタッフの初期シフトの組み方は？')">新人シフト</button>
  </div>

  <div class="input-area">
    <textarea id="userInput" placeholder="シフトについて相談する..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
  let conversationHistory = [];
  let isLoading = false;

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function sendQuick(text) {
    document.getElementById('userInput').value = text;
    sendMessage();
  }

  function addMessage(role, text) {
    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `message ${role === 'user' ? 'user' : 'ai'}`;
    div.innerHTML = `
      <div class="icon">${role === 'user' ? '👤' : '🤖'}</div>
      <div class="bubble">${text.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</div>
    `;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  function showTyping() {
    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message ai typing-indicator';
    div.id = 'typing';
    div.innerHTML = `
      <div class="icon">🤖</div>
      <div class="bubble">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
    `;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typing');
    if (el) el.remove();
  }

  async function sendMessage() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text || isLoading) return;

    isLoading = true;
    document.getElementById('sendBtn').disabled = true;
    input.value = '';
    input.style.height = 'auto';

    addMessage('user', text);
    conversationHistory.push({ role: 'user', content: text });
    showTyping();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: conversationHistory }),
      });

      const data = await res.json();
      removeTyping();

      if (data.reply) {
        addMessage('assistant', data.reply);
        conversationHistory.push({ role: 'assistant', content: data.reply });
      } else {
        addMessage('assistant', 'エラーが発生しました。もう一度お試しください。');
      }
    } catch (err) {
      removeTyping();
      addMessage('assistant', '通信エラーが発生しました。ネットワーク接続を確認してください。');
    }

    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
    input.focus();
  }
</script>
</body>
</html>
